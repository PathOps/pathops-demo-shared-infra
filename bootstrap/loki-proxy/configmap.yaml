apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-proxy-config
  namespace: loki
data:
  nginx.conf: |
    events {}

    http {
      server {
        listen 80;

        location / {
          proxy_pass http://loki-gateway.loki.svc.cluster.local;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Scope-OrgID demo;
        }
      }
    }