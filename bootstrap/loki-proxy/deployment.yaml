apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki-proxy
  namespace: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki-proxy
  template:
    metadata:
      labels:
        app: loki-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: loki-proxy-config